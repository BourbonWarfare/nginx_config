#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;
	
	server_names_hash_bucket_size  64;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;
		
	server {
		listen 80;
		# IPv6
		listen [::]:80;

		# Remove www
		server_name *.bourbonwarfare.com *.bwarma.com;
		
		location ^~ /.well-known/acme-challenge/ {
			root B:/acme-webroot;
			default_type "text/plain";
			try_files $uri =404;
		}
		
		location / {
			return 301 https://$host$request_uri;
		}
	}
	
	# Homepage configuration.
	server {
        listen       443 ssl;
        server_name  bourbonwarfare.com bwarma.com bourbonwarfare.club;

        ssl_certificate      B:/web/ssl/bourbonwarfare.com-crt.pem;
        ssl_certificate_key  B:/web/ssl/bourbonwarfare.com-key.pem;

        location / {
            root   B:/web/bourbonwarfare.com/;
            index  index.html index.htm;
        }
		location /a3missions/ { # this is for the a3 mission downloads from in-game (Added June 2025)
			alias  B:/gameservers/arma/missions/main/;
		}
    }
	
	# Board configuration.
	server {
        listen		443 ssl;
		server_name forums.bourbonwarfare.com forums.bwarma.com;
		root B:/web/bourbonwarfare.com/forums/;
		
		ssl_certificate      B:/web/ssl/forums.bourbonwarfare.com-crt.pem;
        ssl_certificate_key  B:/web/ssl/forums.bourbonwarfare.com-key.pem;

		# 2025/09/23 - forums are being scraped by IPs in this range
		deny 5.44.0.0/20;
		deny 8.160.0.0/16;
		deny 41.208.0.0/18;
		deny 43.0.0.0/8;
		deny 49.0.0.0/8;
		deny 101.0.0.0/8;
		deny 109.248.0.0/24;
		deny 119.28.0.0/23;
		deny 160.178.0.0/21;
		deny 170.106.0.0/16;
		deny 181.66.0.0/19;
		deny 189.136.0.0/21;
		deny 200.59.0.0/24;
		deny 212.252.73.0/24;
		allow 101.127.109.40/32;

        location / {
            # phpbb uses index.htm
            index index.php index.html index.htm;
            try_files $uri $uri/ @rewriteapp;
        }

        location @rewriteapp {
            rewrite ^(.*)$ /app.php/$1 last;
        }

        # Deny access to internal phpbb files.
        location ~ /(config\.php|common\.php|includes|cache|files|store|images/avatars/upload) {
            deny all;
            # deny was ignored before 0.8.40 for connections over IPv6.
            # Use internal directive to prohibit access on older versions.
            internal;
        }

        # Pass the php scripts to fastcgi server specified in upstream declaration.
        location ~ \.php(/|$) {
            # Unmodified fastcgi_params from nginx distribution.
            include fastcgi_params;
            # Necessary for php.
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            try_files $uri $uri/ /app.php$is_args$args;
            fastcgi_pass php;
        }

        # Deny access to version control system directories.
        location ~ /\.svn|/\.git {
            deny all;
            internal;
        }
    }

    # If running php as fastcgi, specify php upstream.
    upstream php {
        server 127.0.0.1:9123;
    }
	
	#Squad XML configuration.	
	server {
        listen		443 ssl;
		server_name squad.bourbonwarfare.com squad.bwarma.com;
		root B:/web/bourbonwarfare.com/squad/;
		
		ssl_certificate      B:/web/ssl/squad.bourbonwarfare.com-crt.pem;
        ssl_certificate_key  B:/web/ssl/squad.bourbonwarfare.com-key.pem;
		
		location / {
            # phpbb uses index.htm
            index squad.php;
            try_files $uri $uri/ @rewriteapp;
        }
		
        # Pass the php scripts to fastcgi server specified in upstream declaration.
        location ~ \.php(/|$) {
            # Unmodified fastcgi_params from nginx distribution.
            include fastcgi_params;
            # Necessary for php.
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            try_files $uri $uri/ /app.php$is_args$args;
            fastcgi_pass php;
        }
	}
	
	#Mod HTML configuration.	
	server {
        listen		443 ssl;
		server_name mods.bourbonwarfare.com mods.bwarma.com;
		root B:/web/bourbonwarfare.com/mods/;
		
		ssl_certificate      B:/web/ssl/mods.bourbonwarfare.com-crt.pem;
        ssl_certificate_key  B:/web/ssl/mods.bourbonwarfare.com-key.pem;
		
		location / {
            index index.html;
        }
		
		location /core {
			try_files $uri $uri.html $uri/ =404;
			index core.html;
		}
	}
	
	#OCAP aar configuration.	
	server {
        listen		443 ssl;
		server_name aar.bourbonwarfare.com aar.bwarma.com;
		root B:/web/ocap/static/;
		
		ssl_certificate      B:/web/ssl/aar.bourbonwarfare.com-crt.pem;
        ssl_certificate_key  B:/web/ssl/aar.bourbonwarfare.com-key.pem;
		
		location / {
			proxy_pass  http://127.0.0.1:5000;
		}
	}
	
	#POTATO Backend Configuration
	server {
        listen		443 ssl;
		server_name staging.bourbonwarfare.com;
		
		ssl_certificate      B:/web/ssl/staging.bourbonwarfare.com-crt.pem;
        ssl_certificate_key  B:/web/ssl/staging.bourbonwarfare.com-key.pem;
		
		# Browser endpoints
		location / {
			proxy_pass  http://127.0.0.1:8500;
			
			error_page 403 =302 /login;
		
		}
		
		# API Endpoints
		location /api(.*)$ {
			proxy_pass  http://127.0.0.1:8500/api$1;
		}
	}
	
