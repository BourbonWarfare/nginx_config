	#Test Bourbonwarfare configuration.	
	server {
        listen		443 ssl;
		server_name test.bourbonwarfare.com test.bwarma.com;
		root B:/web/test/public;
		
		ssl_certificate      B:/web/ssl/test.bourbonwarfare.com-crt.pem;
        ssl_certificate_key  B:/web/ssl/test.bourbonwarfare.com-key.pem;
		
		location / {
            index index.html;
        }
	}
